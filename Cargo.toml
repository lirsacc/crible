[package]
name = "crible"
version = "0.1.0"
authors = ["lirsacc <c.lirsac@gmail.com>"]
edition = "2018"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
bincode = "1.3.1"
croaring = "0.4.5"
csv = "1.1"
log = "0.4.8"
pretty_env_logger = "0.4.0"
structopt = { version = "0.3", default-features = false }
thiserror = "1.0.20"
pest = "2.1.3"
pest_derive = "2.1.0"
boolean_expression = "0.4.0"
tokio = { version = "0.2", features = ["macros", "process", "sync", "rt-core", "rt-threaded", "fs", "blocking"] }
warp = "0.2"
serde = "1.0.114"
serde_derive = "1.0.114"
serde_json = "1.0.55"
